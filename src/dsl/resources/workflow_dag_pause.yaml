# This is the workflow yaml file called by pause mode as internal usage.
# WorkflowId must be specified when start binary in pause mode
# It is only used in DAG workflow
#      When the workflow execute the activity, the internal task type key : "pause" will
# trigger execute the print activity and then make a chanel from current ctx and wait for
# the next DAG_reload signal generated by pause or update mode until timeout

meta:
  name: pause_wf
  max_duration: 5m
  max_start_time: 10s

root:
- pause

nodes:
  - name: pause
    activity:
      name: main.pauseActivity
      internal_task_type: pause