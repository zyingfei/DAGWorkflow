# This sample workflow execute 4 nodes in a DAG flow.
# 1) sampleActivity1, takes arg1 as input, and put result as result1.
# 2) sampleActivity2, takes result1 as input, and put result as result2. It will randomly generate err.
# 3) sampleActivity3, takes args2 and result2 as input, and put result as result3.
# The stop_on_err is set to be true here, if sampleActivity2 generate err in any nodes, the whole workflow would be killed
# Happy flow: once the flipcoin1 is executed successfully, the flipcoin2 and flipcoin3 will be executed, flipcoin4 will wait flipcoin2 and flipcoin3 and then execute.
#
# whenever the err happens, the following activities within the same statement after the err one would not be executed.
# (This one would not be seen here cause the err will trigger the cancel of the workflow first)

meta:
  name: wf2
  max_duration: 10m
  max_start_time: 10s
root:
  - flipcoin1

variables:
  arg1: value1
  arg2: value2

root:
- flipcoin1

nodes:
  - name: flipcoin1
    sequence:
      elements:
      - activity:
          name: main.sampleActivity1
          arguments:
          - arg1
          result: result1
      - activity:
          name: main.sampleActivity2
          arguments:
          - result1
          result: result2
          maximum_attempts: 5
          max_duration: 5m
          heartbeat: true
        stop_on_err: true
      - activity:
          name: main.sampleActivity3
          arguments:
          - arg2
          - result2
          result: result3
    next:
    - flipcoin2
    - flipcoin3
  - name: flipcoin2
    sequence:
      elements:
        - activity:
            name: main.sampleActivity1
            arguments:
            - arg1
            result: result1
        - activity:
            name: main.sampleActivity2
            arguments:
            - result1
            result: result2
            maximum_attempts: 1
            max_duration: 5m
            heartbeat: true
          stop_on_err: true
        - activity:
            name: main.sampleActivity3
            arguments:
            - arg2
            - result2
            result: result3
    next:
    - flipcoin4
  - name: flipcoin3
    sequence:
      elements:
        - activity:
            name: main.sampleActivity1
            arguments:
            - arg1
            result: result1
        - activity:
            name: main.sampleActivity2
            arguments:
            - result1
            result: result2
            maximum_attempts: 5
            max_duration: 5m
            heartbeat: true
          stop_on_err: true
        - activity:
            name: main.sampleActivity3
            arguments:
            - arg2
            - result2
            result: result3
    next:
    - flipcoin4
  - name: flipcoin4
    sequence:
      elements:
        - activity:
            name: main.sampleActivity1
            arguments:
            - arg1
            result: result1
        - activity:
            name: main.sampleActivity2
            arguments:
            - result1
            result: result2
            maximum_attempts: 1
            max_duration: 5m
            heartbeat: true
          stop_on_err: true
        - activity:
            name: main.sampleActivity3
            arguments:
            - arg2
            - result2
            result: result3
